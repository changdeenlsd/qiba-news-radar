name: Daily News Radar

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch news
        run: python3 fetch_news.py

      - name: Build digest
        run: python3 build_digest.py

      - name: Commit updated news
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data docs/index.html
          git commit -m "Update daily news radar" || echo "No changes to commit"
          git push
