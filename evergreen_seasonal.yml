  - title: The Tale of Two Tables
    url: https://www.edweek.org/education/opinion-the-tale-of-two-tables/2008/07
    source: Education Week
    original_year: 2008
    published_at: "2008-07-16"
    language: en
    region: 英文世界
    seasonal_windows:
      - late_may_june
      - july_august
    themes:
      - 暑假阅读
      - 暑假书单
      - 学校指定阅读
      - 自主阅读
      - 阅读兴趣
      - 亲子阅读
    evergreen_score: 90
    stale_risk: low
    content_type: 经典重读
    topic_type: seasonal_evergreen_fallback
    is_evergreen_fallback: true
    exclude_from_top20: true
    qiba_angle: 为什么暑假书单越长，孩子反而越不想读书？真正需要保护的是孩子自己选书的权利。
    why_still_relevant: 每年暑假前后，学校书单、指定阅读、阅读打卡和孩子自主选书都会重新成为家庭教育议题。文章讨论的是阅读兴趣与阅读自主权，不依赖过时政策、价格或产品信息。
    notes: 旧文只作为本周时令选题 fallback，不进入 Top20。
