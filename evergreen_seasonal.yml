    qiba_angle: "暑假不是把阅读变成任务清单，而是给孩子重新建立每天有书可读、想读什么能拿到的环境。"
    why_still_relevant: "每年暑假前，家长都会重新面对阅读滑坡、阅读兴趣和图书可及性问题。"
    notes: "研究引用较旧，但主题常青，适合做暑假阅读底层材料。"
