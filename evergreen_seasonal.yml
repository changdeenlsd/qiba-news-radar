    qiba_angle: "期末前，父母最该做的不是替孩子消灭焦虑，而是别把自己的焦虑放大给孩子。"
    why_still_relevant: "考试前后，孩子焦虑和父母过度保护每年都会出现，文章原则稳定。"
    notes: "心理健康类内容，只作家庭沟通建议，不作医疗诊断。"
